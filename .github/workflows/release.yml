name: Release Build
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: | chmod +x gradlew
      - name: Build with Gradle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_TYPE: ${{ secrets.KEYSTORE_TYPE }}
        run: |
          echo "GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}" >> local.properties
          echo "GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}" >> local.properties
          echo "PROXY_URL=${{ secrets.PROXY_URL }}" >> local.properties
          echo "DONATE_URL=${{ secrets.DONATE_URL }}" >> local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
          ./gradlew assembleRelease

      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/Rupoop-release.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
